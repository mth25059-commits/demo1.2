<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Michael Smith — Creative developer & designer. Collection '26."
    />
    <title>Michael Smith — Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <!-- Graceful fallback: if any remote image fails to load, swap in a placeholder -->
    <script>
      document.addEventListener(
        "error",
        function (e) {
          var t = e.target;
          if (t && t.tagName === "IMG" && !t.dataset.fallback) {
            t.dataset.fallback = "1";
            t.src =
              "https://picsum.photos/seed/" +
              (t.alt || Math.random().toString(36).slice(2)) +
              "/800/800";
          }
        },
        true
      );
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
